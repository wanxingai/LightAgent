name: Codex Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-reviewer:
    name: Codex Reviewer
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Codex Reviewer
        uses: p2achAI/codex-reviewer@v2.0.0
