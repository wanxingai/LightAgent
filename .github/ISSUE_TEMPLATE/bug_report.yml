name: Bug report
description: Report a reproducible LightAgent bug.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction so maintainers can verify it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest code sample or command that reproduces the issue.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LightAgent version
      placeholder: "0.7.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and provider
      description: OS, model provider, model name, base_url style, and whether tools/MCP/memory/streaming were enabled.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: text
